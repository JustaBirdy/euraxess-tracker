name: Daily Euraxess scan

on:
  schedule:
    # 每天 UTC 0:07 触发 ≈ 北京时间 8:07
    # 选 07 分是为了避开整点 GitHub Actions 调度高峰
    - cron: '7 0 * * *'
  workflow_dispatch: {}  # 在 GitHub 仓库 Actions 页可手动触发

permissions:
  contents: write  # 需要写权限才能把 jobs.jsonl / jobs.xlsx push 回仓库

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jobs.jsonl jobs.xlsx
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily euraxess scan $(date -u +%Y-%m-%d)"
            git push
          fi
